name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black ruff playwright
          python -m playwright install --with-deps chromium

      - name: Run Python syntax check
        run: python -m py_compile instagramdumpconverter/app.py

      - name: Run Ruff
        run: ruff check instagramdumpconverter tests

      - name: Run Black check
        run: black --check instagramdumpconverter tests

      - name: Run test suite
        run: python -m unittest discover -s tests -v
